services:

  postgres:
    image: postgres:16-alpine
    container_name: prpulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: prpulse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: ./services/api
    container_name: prpulse_api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/prpulse
    depends_on:
      - postgres

volumes:
  postgres_data: