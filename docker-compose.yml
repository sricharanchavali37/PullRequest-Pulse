services:

  postgres:
    image: postgres:16-alpine
    container_name: prpulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       prpulse
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: prpulse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  webhook:
    build: ./services/webhook
    container_name: prpulse_webhook
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GITHUB_WEBHOOK_SECRET: ""
    depends_on:
      - redis

  worker:
    build: ./services/worker
    container_name: prpulse_worker
    restart: unless-stopped
    environment:
      REDIS_HOST:   redis
      REDIS_PORT:   "6379"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/prpulse
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_REPO:  ${GITHUB_REPO}
    depends_on:
      - redis
      - postgres

  api:
    build: ./services/api
    container_name: prpulse_api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/prpulse
      REDIS_HOST:   redis
      REDIS_PORT:   "6379"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: prpulse_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data: